<body><div id="root"></div>
<script type="text/babel">
const { LanguagePill, SectionTabs } = window.Ds2daynewsDesignSystem_0b44f3;
function Demo(){
  const [sec,setSec]=React.useState('politics');
  return <>
    <div className="pad"><p className="lbl">Language selector</p>
      <div className="row"><LanguagePill code="te" active/><LanguagePill code="ta"/><LanguagePill code="hi"/><LanguagePill code="en"/></div>

}
