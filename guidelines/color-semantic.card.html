<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Success / warning / danger / info" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--white);font-family:var(--font-body);padding:16px}.sw{display:flex;gap:12px}.g{flex:1;display:flex;flex-direction:column;gap:6px}.c{height:44px;border-radius:8px}.s{height:26px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600}.n{font-family:var(--font-display);font-weight:600;font-size:11px;color:#fff;padding:0 8px;height:44px;display:flex;align-items:center}</style></head>
<body><div class="sw">
<div class="g"><div class="c" style="background:var(--success)"><span class="n">Success</span></div><div class="s" style="background:var(--success-soft);color:var(--success)">soft</div></div>
<div class="g"><div class="c" style="background:var(--warning)"><span class="n">Warning</span></div><div class="s" style="background:var(--warning-soft);color:var(--gold-700)">soft</div></div>
<div class="g"><div class="c" style="background:var(--danger)"><span class="n">Danger</span></div><div class="s" style="background:var(--danger-soft);color:var(--danger)">soft</div></div>
<div class="g"><div class="c" style="background:var(--info)"><span class="n">Info</span></div><div class="s" style="background:var(--info-soft);color:var(--info)">soft</div></div>
</div></body></html>
