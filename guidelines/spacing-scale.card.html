<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--white);font-family:var(--font-mono);padding:18px}.row{display:flex;align-items:flex-end;gap:14px}.c{display:flex;flex-direction:column;align-items:center;gap:6px}.b{background:var(--brand);border-radius:3px}.n{font-size:9.5px;color:var(--text-muted)}</style></head>
<body><div class="row">
<div class="c"><div class="b" style="width:4px;height:4px"></div><span class="n">1·4</span></div>
<div class="c"><div class="b" style="width:8px;height:8px"></div><span class="n">2·8</span></div>
<div class="c"><div class="b" style="width:12px;height:12px"></div><span class="n">3·12</span></div>
<div class="c"><div class="b" style="width:16px;height:16px"></div><span class="n">4·16</span></div>
<div class="c"><div class="b" style="width:24px;height:24px"></div><span class="n">6·24</span></div>
<div class="c"><div class="b" style="width:32px;height:32px"></div><span class="n">8·32</span></div>
<div class="c"><div class="b" style="width:48px;height:48px"></div><span class="n">12·48</span></div>
<div class="c"><div class="b" style="width:64px;height:64px"></div><span class="n">16·64</span></div>
</div></body></html>
