<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--white);font-family:var(--font-body);padding:16px}.sw{display:flex;gap:6px}.c{flex:1;height:78px;border-radius:8px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}.n{font-family:var(--font-mono);font-size:9.5px}</style></head>
<body><div class="sw">
<div class="c" style="background:var(--ink-900)"><span class="n" style="color:#fff">900</span></div>
<div class="c" style="background:var(--ink-700)"><span class="n" style="color:#fff">700</span></div>
<div class="c" style="background:var(--ink-500)"><span class="n" style="color:#fff">500</span></div>
<div class="c" style="background:var(--ink-400)"><span class="n" style="color:#fff">400</span></div>
<div class="c" style="background:var(--ink-300)"><span class="n" style="color:var(--ink-900)">300</span></div>
<div class="c" style="background:var(--ink-200)"><span class="n" style="color:var(--ink-900)">200</span></div>
<div class="c" style="background:var(--ink-100)"><span class="n" style="color:var(--ink-900)">100</span></div>
<div class="c" style="background:var(--ink-50);border:1px solid var(--ink-100)"><span class="n" style="color:var(--ink-900)">50</span></div>
</div></body></html>
