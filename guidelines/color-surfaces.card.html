<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & Gold" subtitle="Warm paper backgrounds + gold accent" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--ink-50);font-family:var(--font-body);padding:16px}.sw{display:flex;gap:8px}.c{flex:1;height:78px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;box-sizing:border-box;border:1px solid var(--border-hairline)}.n{font-family:var(--font-mono);font-size:10px}.hx{font-family:var(--font-mono);font-size:9px;opacity:.65}</style></head>
<body><div class="sw">
<div class="c" style="background:var(--paper)"><span class="n">paper</span><span class="hx">#FAF7F2</span></div>
<div class="c" style="background:var(--paper-sunk)"><span class="n">paper-sunk</span></div>
<div class="c" style="background:var(--white)"><span class="n">card / white</span></div>
<div class="c" style="background:var(--gold-300)"><span class="n">gold 300</span></div>
<div class="c" style="background:var(--gold-500)"><span class="n" style="color:#fff">gold 500</span><span class="hx" style="color:#fff">#E8A020</span></div>
<div class="c" style="background:var(--gold-700)"><span class="n" style="color:#fff">gold 700</span></div>
</div></body></html>
