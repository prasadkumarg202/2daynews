<!-- @dsCard group="Colors" viewport="700x210" name="Category coding" subtitle="Fixed hue per news section" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--white);font-family:var(--font-body);padding:16px}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.c{height:48px;border-radius:8px;display:flex;align-items:flex-end;padding:6px;box-sizing:border-box}.n{font-family:var(--font-display);font-weight:600;font-size:10px;color:#fff}</style></head>
<body><div class="grid">
<div class="c" style="background:var(--cat-breaking)"><span class="n">Breaking</span></div>
<div class="c" style="background:var(--cat-politics)"><span class="n">Politics</span></div>
<div class="c" style="background:var(--cat-crime)"><span class="n">Crime</span></div>
<div class="c" style="background:var(--cat-cinema)"><span class="n">Cinema</span></div>
<div class="c" style="background:var(--cat-sports)"><span class="n">Sports</span></div>
<div class="c" style="background:var(--cat-business)"><span class="n">Business</span></div>
<div class="c" style="background:var(--cat-jobs)"><span class="n">Jobs</span></div>
<div class="c" style="background:var(--cat-weather)"><span class="n">Weather</span></div>
<div class="c" style="background:var(--cat-astrology)"><span class="n">Astro</span></div>
<div class="c" style="background:var(--cat-gold)"><span class="n">Gold</span></div>
<div class="c" style="background:var(--cat-education)"><span class="n">Educ</span></div>
<div class="c" style="background:var(--cat-health)"><span class="n">Health</span></div>
<div class="c" style="background:var(--cat-tech)"><span class="n">Tech</span></div>
<div class="c" style="background:var(--cat-national)"><span class="n">National</span></div>
<div class="c" style="background:var(--cat-mynews)"><span class="n">My News</span></div>
<div class="c" style="background:var(--cat-finance)"><span class="n">Finance</span></div>
<div class="c" style="background:var(--cat-cooking)"><span class="n">Cooking</span></div>
<div class="c" style="background:var(--cat-shorts)"><span class="n">Shorts</span></div>
</div></body></html>
