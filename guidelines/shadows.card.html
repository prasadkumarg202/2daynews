<!-- @dsCard group="Spacing" viewport="700x160" name="Shadows & elevation" subtitle="Crisp paper cards, restrained lift" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--paper);font-family:var(--font-mono);padding:22px}.row{display:flex;gap:22px}.c{display:flex;flex-direction:column;align-items:center;gap:10px}.b{width:96px;height:60px;background:var(--white);border-radius:10px}.n{font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="row">
<div class="c"><div class="b" style="box-shadow:var(--shadow-hairline)"></div><span class="n">hairline</span></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-card)"></div><span class="n">card</span></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-raised)"></div><span class="n">raised</span></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-pop)"></div><span class="n">pop</span></div>
<div class="c"><div class="b" style="box-shadow:var(--shadow-brand)"></div><span class="n">brand</span></div>
</div></body></html>
