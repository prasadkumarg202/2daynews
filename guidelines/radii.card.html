<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Corner rounding tokens" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--white);font-family:var(--font-mono);padding:18px}.row{display:flex;gap:16px;align-items:flex-end}.c{display:flex;flex-direction:column;align-items:center;gap:8px}.b{width:64px;height:56px;background:var(--red-50);border:1.5px solid var(--brand)}.n{font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="row">
<div class="c"><div class="b" style="border-radius:var(--r-xs)"></div><span class="n">xs · 4</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-sm)"></div><span class="n">sm · 6</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-md)"></div><span class="n">md · 10</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-card)"></div><span class="n">card · 12</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-lg)"></div><span class="n">lg · 14</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-xl)"></div><span class="n">xl · 20</span></div>
<div class="c"><div class="b" style="border-radius:var(--r-pill)"></div><span class="n">pill</span></div>
</div></body></html>
