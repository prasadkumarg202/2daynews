<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark" subtitle="Type-only mark — no logo supplied" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--paper);font-family:var(--font-display);padding:22px;display:flex;flex-direction:column;gap:18px}.wm{font-weight:800;font-size:44px;letter-spacing:-.02em;color:var(--ink-900);display:inline-flex;align-items:center}.wm .two{color:var(--brand)}.chip{display:inline-flex;align-items:center;background:var(--ink-900);color:#fff;font-weight:800;font-size:26px;padding:6px 14px;border-radius:10px;letter-spacing:-.02em}.chip .two{color:var(--red-400)}.k{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em}</style></head>
<body>
<span class="k">Wordmark · primary</span>
<span class="wm"><span class="two">tap2</span>news</span>
<span class="k">Lockup chip · for headers / app icon slot</span>
<span class="chip"><span class="two">tap2</span>news</span>
</body></html>
